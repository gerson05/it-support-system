<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguimiento de Paquete — Mi Farmacia IT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #e2e8f0;
      min-height: 100vh;
    }
    #app-root { min-height: 100vh; }
    .spinner-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(99,102,241,.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-text { font-size: 13px; color: #64748b; }
  </style>
</head>
<body>
  <div id="app-root">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span class="spinner-text">Cargando…</span>
    </div>
  </div>
  <!-- Scripts en orden correcto -->
  <script src="/js/core/constants.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/utils/format.js"></script>
  <script src="/js/features/tracking/tracking-public.js"></script>
</body>
</html>
