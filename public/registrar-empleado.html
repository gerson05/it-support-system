<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creación de Usuarios - Personal Nuevo</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        /* ===== Page Container ===== */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }

        #navbar {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        #navbar h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            color: white;
        }

        #navbar .navbar-actions {
            display: flex;
            gap: 15px;
        }

        /* ===== Button Styles ===== */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .btn-success {
            background-color: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background-color: #229954;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }

        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c0392b;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
        }

        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
            box-shadow: 0 4px 12px rgba(149, 165, 166, 0.3);
        }

        /* ===== Tab Navigation ===== */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 0 20px;
            border-bottom: 2px solid #ecf0f1;
        }

        .tab-button {
            padding: 12px 20px;
            border: none;
            background-color: transparent;
            color: #7f8c8d;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            outline: none;
            position: relative;
            bottom: -2px;
        }

        .tab-button:hover {
            color: #2c3e50;
            background-color: #ecf0f1;
            border-bottom-color: #95a5a6;
        }

        .tab-button.active {
            color: #2980b9;
            border-bottom-color: #2980b9;
        }

        /* ===== Table Container ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .employees-table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .employees-table thead {
            background-color: #34495e;
            color: white;
        }

        .employees-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 2px solid #2c3e50;
        }

        .employees-table td {
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            font-size: 14px;
        }

        .employees-table tbody tr:hover {
            background-color: #f8f9fa;
            transition: background-color 0.2s ease;
        }

        .employees-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* ===== Status Badge ===== */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
        }

        .badge-pending {
            background-color: #ffeaa7;
            color: #d63031;
        }

        .badge-completed {
            background-color: #55efc4;
            color: #00b894;
        }

        .badge-in-progress {
            background-color: #74b9ff;
            color: #0984e3;
        }

        /* ===== Actions Column ===== */
        .actions-cell {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .action-btn-edit {
            background-color: #3498db;
            color: white;
        }

        .action-btn-edit:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .action-btn-delete {
            background-color: #e74c3c;
            color: white;
        }

        .action-btn-delete:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
        }

        /* ===== Modal Styles ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background-color: #ffffff;
            margin: 50px auto;
            padding: 0;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            max-width: 800px;
            width: 90%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-bottom: 2px solid #34495e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }

        .close {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }

        .close:hover {
            background-color: #34495e;
        }

        .modal-body {
            padding: 30px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid #ecf0f1;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            background-color: #f8f9fa;
        }

        /* ===== Form Styles ===== */
        #formEmployee {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-section {
            border: 1px solid #ecf0f1;
            border-radius: 6px;
            padding: 20px;
            background-color: #f8f9fa;
        }

        .form-section.gh {
            border-left: 4px solid #27ae60;
        }

        .form-section.it {
            border-left: 4px solid #3498db;
        }

        .form-section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section.gh .form-section-title {
            color: #27ae60;
        }

        .form-section.it .form-section-title {
            color: #3498db;
        }

        .form-section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: currentColor;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 6px;
            color: #2c3e50;
            font-size: 14px;
        }

        .form-group label .required {
            color: #e74c3c;
            margin-left: 3px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-group input[readonly],
        .form-group select[readonly] {
            background-color: #ecf0f1;
            color: #7f8c8d;
            cursor: not-allowed;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            #navbar {
                flex-direction: column;
                gap: 15px;
            }

            #navbar h1 {
                font-size: 18px;
            }

            .navbar-actions {
                width: 100%;
                justify-content: stretch;
            }

            .navbar-actions button {
                flex: 1;
            }

            .tabs-container {
                flex-wrap: wrap;
                padding: 0 10px;
            }

            .tab-button {
                padding: 10px 15px;
                font-size: 13px;
            }

            .employees-table {
                font-size: 12px;
            }

            .employees-table th,
            .employees-table td {
                padding: 10px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .modal-content {
                width: 95%;
                margin: 20px auto;
            }

            .modal-body {
                padding: 20px;
            }

            .modal-footer {
                flex-direction: column;
                gap: 10px;
            }

            .modal-footer button {
                width: 100%;
            }

            .actions-cell {
                flex-direction: column;
                gap: 5px;
            }

            .action-btn {
                width: 100%;
            }
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #7f8c8d;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-state-text {
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* ===== Loading State ===== */
        .loading {
            text-align: center;
            padding: 30px;
            color: #7f8c8d;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #ecf0f1;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== Form Error/Success States ===== */
        .form-group.error input,
        .form-group.error select {
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 4px;
        }

        .success-message {
            color: #27ae60;
            font-size: 12px;
            margin-top: 4px;
        }

        /* ===== Utility Classes ===== */
        .text-center {
            text-align: center;
        }

        .text-muted {
            color: #7f8c8d;
        }

        .text-truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mt-0 {
            margin-top: 0;
        }

        .mb-0 {
            margin-bottom: 0;
        }

        .mt-1 {
            margin-top: 10px;
        }

        .mb-1 {
            margin-bottom: 10px;
        }

        .mt-2 {
            margin-top: 20px;
        }

        .mb-2 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div id="navbar">
        <h1>📋 Creación de Usuarios - Personal Nuevo</h1>
        <div class="navbar-actions">
            <button id="btnNewEmployee" class="btn btn-primary">+ Nuevo Empleado</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Tab Navigation -->
        <div class="tabs-container">
            <button class="tab-button active" data-tab="pendientes">Pendientes</button>
            <button class="tab-button" data-tab="completados">Completados</button>
        </div>

        <!-- Employees Table -->
        <div id="pendientes-tab" class="tab-content active">
            <table class="employees-table">
                <thead>
                    <tr>
                        <th>Cedula</th>
                        <th>Nombre</th>
                        <th>Cargo</th>
                        <th>Area</th>
                        <th>Estado</th>
                        <th>Usuario</th>
                        <th>Contraseña</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="pendientes-tbody">
                    <!-- Populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <div id="completados-tab" class="tab-content" style="display: none;">
            <table class="employees-table">
                <thead>
                    <tr>
                        <th>Cedula</th>
                        <th>Nombre</th>
                        <th>Cargo</th>
                        <th>Area</th>
                        <th>Estado</th>
                        <th>Usuario</th>
                        <th>Contraseña</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="completados-tbody">
                    <!-- Populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal for Employee Form -->
    <div id="modalEmployee" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nuevo Empleado</h2>
                <button id="btnCloseModal" class="close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="formEmployee">
                    <!-- GH Section -->
                    <div class="form-section gh">
                        <div class="form-section-title">Información General de GH</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="cedula">Cedula <span class="required">*</span></label>
                                <input type="text" id="cedula" name="cedula" required>
                                <span class="error-message" id="cedula-error"></span>
                            </div>
                            <div class="form-group">
                                <label for="nombreCompleto">Nombre Completo <span class="required">*</span></label>
                                <input type="text" id="nombreCompleto" name="nombreCompleto" required>
                                <span class="error-message" id="nombreCompleto-error"></span>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="cargo">Cargo <span class="required">*</span></label>
                                <input type="text" id="cargo" name="cargo" required>
                                <span class="error-message" id="cargo-error"></span>
                            </div>
                            <div class="form-group">
                                <label for="area">Area <span class="required">*</span></label>
                                <select id="area" name="area" required>
                                    <option value="">Seleccionar Area...</option>
                                    <option value="TI">Tecnología e Información</option>
                                    <option value="Finanzas">Finanzas</option>
                                    <option value="RRHH">Recursos Humanos</option>
                                    <option value="Operaciones">Operaciones</option>
                                    <option value="Ventas">Ventas</option>
                                    <option value="Servicios">Servicios</option>
                                </select>
                                <span class="error-message" id="area-error"></span>
                            </div>
                        </div>
                    </div>

                    <!-- IT Section -->
                    <div class="form-section it">
                        <div class="form-section-title">Información de Acceso IT</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="usuario">Usuario <span class="required">*</span></label>
                                <input type="text" id="usuario" name="usuario" readonly>
                                <span class="success-message">Se generará automáticamente</span>
                            </div>
                            <div class="form-group">
                                <label for="contraseña">Contraseña <span class="required">*</span></label>
                                <input type="password" id="contraseña" name="contraseña" readonly>
                                <span class="success-message">Se generará automáticamente</span>
                            </div>
                        </div>
                        <div class="form-row full">
                            <div class="form-group">
                                <label for="fechaRespuesta">Fecha de Respuesta <span class="required">*</span></label>
                                <input type="date" id="fechaRespuesta" name="fechaRespuesta" required>
                                <span class="error-message" id="fechaRespuesta-error"></span>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button id="btnCancelForm" class="btn btn-secondary">Cancelar</button>
                <button id="btnSubmitForm" class="btn btn-success">Guardar Empleado</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/employees.js"></script>
    <script src="/js/employees-form.js"></script>
</body>
</html>
