<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Usuarios - IT Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t === 'light') document.documentElement.setAttribute('data-theme','light');
    })();
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .main-content { margin-left: var(--sidebar-w); flex: 1; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-header h1 { font-size: 24px; font-weight: 600; margin: 0; }

    .tabs-container {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      padding: 0 24px;
    }

    .tab-button {
      padding: 12px 16px;
      border: none;
      background: transparent;
      color: var(--text-2);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: var(--transition);
      position: relative;
      margin-bottom: -1px;
    }

    .tab-button:hover {
      color: var(--text);
      border-bottom-color: var(--border-2);
    }

    .tab-button.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .employees-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .employees-table thead {
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .employees-table th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .employees-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      color: var(--text);
    }

    .employees-table tbody tr:hover {
      background: var(--surface-hover);
    }

    .employees-table tbody tr:last-child td {
      border-bottom: none;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
    }

    .badge-pendiente { background: rgba(245,158,11,.15); color: var(--warning); }
    .badge-completado { background: rgba(16,185,129,.15); color: var(--success); }

    .actions-cell {
      display: flex;
      gap: 6px;
    }

    .btn-sm {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-primary-sm { background: var(--primary); color: white; }
    .btn-primary-sm:hover { background: var(--primary-dark); }
    .btn-danger-sm { background: var(--danger); color: white; }
    .btn-danger-sm:hover { background: rgba(239,68,68,.8); }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,.6);
      animation: fadeIn 0.2s ease;
    }

    .modal.active { display: flex; align-items: center; justify-content: center; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      max-width: 700px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-2);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }

    .close-btn:hover { background: var(--surface-hover); color: var(--text); }

    .modal-body { padding: 24px; }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface-2);
    }

    .form-section {
      margin-bottom: 20px;
      padding: 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--primary);
    }

    .form-section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-2);
      margin-bottom: 12px;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row.full { grid-template-columns: 1fr; }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text);
    }

    .form-group label .required {
      color: var(--danger);
      margin-left: 2px;
    }

    .form-group input,
    .form-group select {
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: var(--transition);
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .form-group input[readonly] {
      background: var(--surface-2);
      color: var(--text-2);
      cursor: not-allowed;
    }

    .help-text { font-size: 12px; color: var(--text-2); margin-top: 4px; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-2);
    }

    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state-text { font-size: 14px; }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface-hover);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: rgba(16,185,129,.8);
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>IT Support</h1>
        <span>Panel de Gestión</span>
      </div>
    </div>
    <nav class="sidebar-menu" id="sidebar-menu">
      <!-- Populated by JS -->
    </nav>
  </aside>

  <main class="main-content">
    <div style="padding: 24px;">
      <div class="page-header">
        <h1>Crear Usuarios</h1>
        <button id="btnNewEmployee" class="btn btn-primary">
          <span>+</span> Nuevo Empleado
        </button>
      </div>

      <div class="tabs-container">
        <button class="tab-button active" data-tab="pendientes">Pendientes</button>
        <button class="tab-button" data-tab="completados">Completados</button>
      </div>

      <div id="pendientes-tab" class="tab-content active" data-tab-content="pendientes">
        <table class="employees-table">
          <thead>
            <tr>
              <th>Cedula</th>
              <th>Nombre</th>
              <th>Cargo</th>
              <th>Area</th>
              <th>Estado</th>
              <th>Usuario</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="employeeTableBody">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>

      <div id="completados-tab" class="tab-content" data-tab-content="completados">
        <table class="employees-table">
          <thead>
            <tr>
              <th>Cedula</th>
              <th>Nombre</th>
              <th>Cargo</th>
              <th>Area</th>
              <th>Estado</th>
              <th>Usuario</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="completadosTableBody">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="modalEmployee" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitleEmployee">Nuevo Empleado</h2>
        <button id="closeModalEmployee" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <form id="formEmployee">
          <div class="form-section">
            <div class="form-section-title">Información de Gestión Humana</div>
            <div class="form-row">
              <div class="form-group">
                <label for="formEmployeeCedula">Cédula <span class="required">*</span></label>
                <input type="text" id="formEmployeeCedula" name="cedula" required>
              </div>
              <div class="form-group">
                <label for="formEmployeeNombre">Nombre Completo <span class="required">*</span></label>
                <input type="text" id="formEmployeeNombre" name="nombre" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="formEmployeeCargo">Cargo <span class="required">*</span></label>
                <input type="text" id="formEmployeeCargo" name="cargo" required>
              </div>
              <div class="form-group">
                <label for="formEmployeeArea">Área <span class="required">*</span></label>
                <input type="text" id="formEmployeeArea" name="area" required>
              </div>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">Información de Acceso IT</div>
            <div class="form-row">
              <div class="form-group">
                <label for="formEmployeeUsuario">Usuario</label>
                <input type="text" id="formEmployeeUsuario" name="usuario" readonly>
                <span class="help-text">Se genera automáticamente</span>
              </div>
              <div class="form-group">
                <label for="formEmployeeContraseña">Contraseña</label>
                <input type="text" id="formEmployeeContraseña" name="contraseña" readonly>
                <span class="help-text">Se genera automáticamente</span>
              </div>
            </div>
            <div class="form-row full">
              <div class="form-group">
                <label for="formEmployeeEstado">Estado</label>
                <select id="formEmployeeEstado" name="estado">
                  <option value="pendiente">Pendiente</option>
                  <option value="completado">Completado</option>
                </select>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="btnCancelModalEmployee" class="btn btn-secondary">Cancelar</button>
        <button id="btnSubmitForm" class="btn btn-success">Guardar</button>
      </div>
    </div>
  </div>

  <script src="/js/core/constants.js"></script>
  <script src="/js/core/api.js"></script>
  <script src="/js/core/router.js"></script>
  <script src="/js/utils/format.js"></script>
  <script src="/js/utils/validators.js"></script>
  <script src="/js/ui/forms.js"></script>
  <script src="/js/ui/toast.js"></script>
  <script src="/js/features/usuarios/usuarios-service.js"></script>
  <script src="/js/features/usuarios/employees.js"></script>
  <script src="/js/features/usuarios/employees-form.js"></script>
</body>
</html>
