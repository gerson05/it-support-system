<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Generar QR WhatsApp</title>
<style>
body{background:#111;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.card{background:#1a1a2e;padding:30px;border-radius:16px;text-align:center;max-width:500px;width:90%}
h2{margin-top:0;color:#667eea}
textarea{width:100%;height:60px;margin:15px 0;padding:10px;background:#0a0a16;border:1px solid #333;color:#fff;border-radius:8px;font-size:11px}
canvas{margin:15px auto;display:block;background:#fff;padding:10px;border-radius:8px}
button{padding:12px 30px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px}
button:hover{filter:brightness(1.1)}
</style>

<body>
<div class="card">
<h2>📱 Vincular WhatsApp</h2>
<p style="color:#94a3b8;font-size:14px;">Genera el código QR escaneable desde WhatsApp</p>

<canvas id="canvas" width="300" height="300"></canvas>
<button id="btn-gen">🔄 Generar QR</button>
<p style="color:#94a3b8;font-size:12px;margin-top:15px;">Abre WhatsApp → Ajustes → Dispositivos vinculados → Escanea</p>
</div>

  const typeNumber = Math.max(4, Math.min(10, Math.ceil(data.length / 50) + 3));
  const qr = qrcode(typeNumber, 'L');
  qr.addData(data);
  qr.make();
  const size = qr.getModuleCount();
  const cellSize = Math.floor(260 / size);
  const offset = Math.floor((300 - cellSize * size) / 2);
  
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, 300, 300);
  ctx.fillStyle = '#000000';
  
  for (let row = 0; row < size; row++) {
    for (let col = 0; col < size; col++) {
      if (qr.isDark(row, col)) {

    }
