<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Support — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08080e;
      --surface: #101018;
      --surface-2: #141422;
      --border: rgba(255,255,255,0.07);
      --border-focus: rgba(99,102,241,0.55);
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-glow: rgba(99,102,241,0.25);
      --danger: #ef4444;
      --text: #e2e8f0;
      --text-2: #94a3b8;
      --text-3: #64748b;
      --radius: 10px;
      --shadow-lg: 0 8px 32px rgba(0,0,0,.7);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-logo {
      width: 40px; height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .login-brand h1 { font-size: 18px; font-weight: 600; }
    .login-brand p { font-size: 13px; color: var(--text-2); margin-top: 2px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .form-group input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .btn-login {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .btn-login:hover { background: var(--primary-dark); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <div>
        <h1>IT Support</h1>
        <p>Panel de Gestión</p>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" autocomplete="username"
               placeholder="admin" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login" id="btn-submit">Iniciar sesión</button>
    </form>
  </div>

  <script>
    (async () => {
      // Si ya hay sesión activa, redirigir al panel
      try {
        const res = await fetch('/api/auth/me');
        if (res.ok) { window.location.replace('/'); return; }
      } catch (_) {}
    })();

    const form = document.getElementById('login-form');
    const errEl = document.getElementById('error-msg');
    const btn = document.getElementById('btn-submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Iniciando sesión...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.replace('/');
        } else {
          errEl.textContent = data.error || 'Credenciales incorrectas.';
          errEl.classList.add('visible');
        }
      } catch (_) {
        errEl.textContent = 'Error de conexión. Verifica que el servidor esté activo.';
        errEl.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
