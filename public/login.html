<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Support — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Modo oscuro (default) — tokens alineados con styles.css ── */
    :root {
      --bg:          #0a0a12;
      --surface:     #15152a;
      --surface-2:   #1b1b32;
      --border:      rgba(255,255,255,0.10);
      --border-focus: rgba(99,102,241,0.60);
      --primary:     #6366f1;
      --primary-dark: #4f46e5;
      --primary-glow: rgba(99,102,241,0.28);
      --danger:      #ef4444;
      --text:        #e8edf5;
      --text-2:      #8fa3bd;
      --text-3:      #5c7396;
      --radius:      10px;
      /* sombra con inset highlight superior — elevación tipo Linear */
      --shadow-lg:   0 8px 40px rgba(0,0,0,.8), 0 2px 8px rgba(0,0,0,.4),
                     inset 0 1px 0 rgba(255,255,255,0.06);
    }

    /* ── Modo claro — tokens alineados con styles.css ── */
    [data-theme="light"] {
      --bg:          #e4eaf4;
      --surface:     #ffffff;
      --surface-2:   #f2f5fb;
      --border:      rgba(0,0,0,0.12);
      --border-focus: rgba(79,70,229,0.65);
      --primary:     #4f46e5;
      --primary-dark: #3730a3;
      --primary-glow: rgba(79,70,229,0.20);
      --danger:      #dc2626;
      --text:        #0f172a;
      --text-2:      #354d66;
      --text-3:      #4f6680;
      --shadow-lg:   0 8px 32px rgba(0,0,0,.15), 0 2px 8px rgba(0,0,0,.08),
                     0 0 0 1px rgba(0,0,0,.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-logo {
      width: 40px; height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .login-brand h1 { font-size: 18px; font-weight: 600; line-height: 1.3; }
    .login-brand p  { font-size: 13px; color: var(--text-2); margin-top: 2px; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      min-height: 44px;           /* touch-friendly-input ≥44px */
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 15px;            /* evita auto-zoom iOS (<16px) */
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .form-group input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    /* error-msg — colores diferenciados por tema */
    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.28);
      color: #fca5a5;             /* contraste sobre dark surface ✓ */
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }
    .error-msg.visible { display: block; }

    /* En light mode el texto rojo claro (#fca5a5) no pasa contraste → oscurecer */
    [data-theme="light"] .error-msg {
      background: rgba(220,38,38,0.08);
      border-color: rgba(220,38,38,0.22);
      color: #991b1b;             /* 7.5:1 sobre blanco ✓ */
    }

    .btn-login {
      width: 100%;
      min-height: 44px;           /* touch-friendly-input ≥44px */
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      touch-action: manipulation;  /* elimina delay 300ms en móvil */
      transition: background 0.15s ease, transform 0.1s ease, opacity 0.15s ease;
    }
    .btn-login:hover   { background: var(--primary-dark); }
    .btn-login:active  { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* ── Botón toggle tema — flotante esquina superior derecha ── */
    .btn-theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      z-index: 10;
    }
    .btn-theme-toggle:hover { background: var(--surface-2); color: var(--text); }
    .btn-theme-toggle svg  { width: 16px; height: 16px; stroke-width: 1.75; flex-shrink: 0; }
    .btn-theme-toggle .icon-sun  { display: none; }
    .btn-theme-toggle .icon-moon { display: block; }
    [data-theme="light"] .btn-theme-toggle .icon-sun  { display: block; }
    [data-theme="light"] .btn-theme-toggle .icon-moon { display: none; }
  </style>
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t === 'light') document.documentElement.setAttribute('data-theme','light');
    })();
  </script>
</head>
<body>
  <button id="btn-theme-toggle" class="btn-theme-toggle" title="Cambiar tema" aria-label="Cambiar tema">
    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/>
      <line x1="12" y1="18" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="7.05" y2="7.05"/>
      <line x1="16.95" y1="16.95" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="6" y2="12"/>
      <line x1="18" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="7.05" y2="16.95"/>
      <line x1="16.95" y1="7.05" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <div>
        <h1>IT Support</h1>
        <p>Panel de Gestión</p>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" autocomplete="username"
               placeholder="admin" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login" id="btn-submit">Iniciar sesión</button>
    </form>
  </div>

  <script>
    document.getElementById('btn-theme-toggle').addEventListener('click', function () {
      var html = document.documentElement;
      var isLight = html.getAttribute('data-theme') === 'light';
      if (isLight) {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'dark');
      } else {
        html.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
      }
    });

    (async () => {
      // Si ya hay sesión activa, redirigir al panel
      try {
        const res = await fetch('/api/auth/me');
        if (res.ok) { window.location.replace('/'); return; }
      } catch (_) {}
    })();

    const form = document.getElementById('login-form');
    const errEl = document.getElementById('error-msg');
    const btn = document.getElementById('btn-submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Iniciando sesión...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          sessionStorage.setItem('it_role', data.role);
          window.location.replace('/');
        } else {
          errEl.textContent = data.error || 'Credenciales incorrectas.';
          errEl.classList.add('visible');
        }
      } catch (_) {
        errEl.textContent = 'Error de conexión. Verifica que el servidor esté activo.';
        errEl.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
