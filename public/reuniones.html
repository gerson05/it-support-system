<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendar Reunión</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
    }
    .logo {
      font-size: 13px;
      font-weight: 700;
      color: #818cf8;
      letter-spacing: .5px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #9ca3af;
      margin-bottom: 4px;
      letter-spacing: .3px;
    }
    .field-input {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 7px;
      background: rgba(255,255,255,.05);
      color: #e2e8f0;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
    }
    .field-input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,.2); }
    .btn-primary-pub {
      width: 100%;
      padding: 10px;
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary-pub:hover { background: #4f46e5; }
    .btn-primary-pub:disabled { opacity: .6; cursor: not-allowed; }
    .btn-sec-pub {
      padding: 10px 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      color: #9ca3af;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-sec-pub:hover { background: rgba(255,255,255,.1); }
    select.field-input option { background: #1a1a2e; }
    textarea.field-input { resize: vertical; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">IT Support · Agendar Reunión</div>
    <div id="app">Cargando…</div>
  </div>
  <script type="module" src="/js/reuniones-public.js"></script>
</body>
</html>
