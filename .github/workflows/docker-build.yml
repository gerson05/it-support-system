name: Docker Build

on:
  pull_request:
    branches: [stage, main]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: it-support-system:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
