name: CI

on:
  pull_request:
    branches: [develop, stage, main]
  push:
    branches: [develop, main, stage]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Coverage comment needs write access to PR comments
permissions:
  contents: read
  pull-requests: write

jobs:
  # ── 1. Unit tests + coverage enforcement ────────────────────────────────────
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage thresholds
        run: npm run test:ci 2>&1 | tee /tmp/coverage-output.txt; exit ${PIPESTATUS[0]}

      - name: Post coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/coverage-output.txt', 'utf8');

            // Extract totals line: "all files | 98.20 | 85.10 | 91.88 |"
            const m = raw.match(/all files\s+\|\s+([\d.]+)\s+\|\s+([\d.]+)\s+\|\s+([\d.]+)/);
            const testsM = raw.match(/tests (\d+)/);
            const passM  = raw.match(/pass (\d+)/);
            const failM  = raw.match(/fail (\d+)/);

            const lines   = m ? m[1] : '?';
            const branches = m ? m[2] : '?';
            const funcs   = m ? m[3] : '?';
            const total   = testsM ? testsM[1] : '?';
            const passed  = passM  ? passM[1]  : '?';
            const failed  = failM  ? failM[1]  : '0';

            const ok = m &&
              parseFloat(lines)   >= 90 &&
              parseFloat(branches) >= 75 &&
              parseFloat(funcs)   >= 85;

            const statusBadge = ok ? '✅ All thresholds met' : '❌ Coverage below threshold';
            const testStatus  = failed === '0' ? `✅ ${passed}/${total} passed` : `❌ ${failed} failed`;

            const body = [
              '## 📊 Coverage Report',
              '',
              `**Tests:** ${testStatus}`,
              '',
              '| Metric | Result | Threshold | Status |',
              '|---|---|---|---|',
              `| Lines | ${lines}% | ≥ 90% | ${parseFloat(lines) >= 90 ? '✅' : '❌'} |`,
              `| Branches | ${branches}% | ≥ 75% | ${parseFloat(branches) >= 75 ? '✅' : '❌'} |`,
              `| Functions | ${funcs}% | ≥ 85% | ${parseFloat(funcs) >= 85 ? '✅' : '❌'} |`,
              '',
              statusBadge,
              '',
              `_Updated by commit \`${{ github.event.pull_request.head.sha || github.sha }}\`_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.startsWith('## 📊 Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── 2. Smoke tests (E2E against real server) ────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PORT: 3001
      NODE_ENV: test
      DATABASE_PATH: database/tickets.db
      LLM_PROVIDER: none
      DISABLE_WHATSAPP: "true"
      DISABLE_INACTIVITY_MONITOR: "true"
      DISABLE_OFFLINE_CHECKER: "true"
      DISABLE_TUNNEL: "true"
      WHATSAPP_VERIFY_TOKEN: ci-test-token
      IT_WHATSAPP_NUMBER: "573000000000"
      IT_PHONE: "573000000000"
      REQ_ADMIN_SECRET: ci-secret-32-chars-long-for-test
      REQ_ADMIN_USER: admin
      REQ_ADMIN_PASS: ci-test-pass
      INIT_ADMIN_PASS: ci-admin-password-for-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Reset database for clean test environment
        run: rm -f database/tickets.db database/tickets.db-shm database/tickets.db-wal

      - name: Run smoke tests
        run: node test-ci.mjs 2>&1 | tee test-output.log; exit ${PIPESTATUS[0]}

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-output-${{ github.run_number }}
          path: test-output.log
          retention-days: 7

  # ── 3. Security: npm audit + Trivy filesystem scan ──────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production deps, critical severity)
        # exceljs→uuid has known high CVEs without a safe fix (breaking change).
        # Threshold set to critical; track high issues manually via Dependabot PRs.
        run: npm audit --omit=dev --audit-level=critical

      - name: Trivy filesystem vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table
