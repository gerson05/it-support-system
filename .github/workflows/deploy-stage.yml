name: Deploy Stage

on:
  push:
    branches: [stage]

jobs:
  deploy:
    name: Deploy to Stage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push stage image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:stage
            ghcr.io/${{ github.repository }}:stage-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify stage deployment
        run: |
          echo "Stage image pushed: ghcr.io/${{ github.repository }}:stage"
          echo "SHA: ${{ github.sha }}"
